<section id="contact" class="py-5 container max-w-6xl mx-auto px-4">
  <div class="mb-5 animate-fade-up text-center">
    <div class="section-line mb-3 mx-auto"></div>
    <h2 class="display-6 fw-bold text-foreground">Get In Touch</h2>
    <p class="text-muted-foreground fs-5 mt-3 mx-auto" style="max-width: 600px;">
      Feel free to reach out for collaborations, opportunities, or just a friendly hello.
    </p>
  </div>
  
  <div class="row justify-content-center">
    <div class="col-md-10 col-lg-8 animate-fade-up animation-delay-100">
      <form class="glass p-4 p-md-5 rounded-5 space-y-4" onsubmit="event.preventDefault(); window.open('mailto:itashwani1@gmail.com?subject=Portfolio%20Contact&body=' + encodeURIComponent('Name: ' + this.name.value + '\nEmail: ' + this.email.value + '\n\n' + this.message.value), '_self');">
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label for="name" class="form-label small fw-medium">Name</label>
            <input type="text" class="form-control bg-muted bg-opacity-25 border-secondary text-foreground p-3" id="name" placeholder="Your name" required>
          </div>
          <div class="col-md-6">
            <label for="email" class="form-label small fw-medium">Email</label>
            <input type="email" class="form-control bg-muted bg-opacity-25 border-secondary text-foreground p-3" id="email" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="mb-4">
          <label for="message" class="form-label small fw-medium">Message</label>
          <textarea class="form-control bg-muted bg-opacity-25 border-secondary text-foreground p-3" id="message" rows="5" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-3 d-flex align-items-center justify-content-center gap-2 glow-primary fs-5 fw-semibold">
          <i data-lucide="send" class="h-5 w-5"></i> Send Message
        </button>
      </form>

      <div class="mt-5 d-flex justify-content-center gap-4 animate-fade-up animation-delay-200">
        <a href="https://www.linkedin.com/in/itashwani1/" target="_blank" class="social-btn" title="LinkedIn"><i data-lucide="linkedin"></i></a>
        <a href="https://github.com/itashwani1" target="_blank" class="social-btn" title="GitHub"><i data-lucide="github"></i></a>
        <a href="mailto:itashwani1@gmail.com" target="_blank" class="social-btn" title="Email"><i data-lucide="mail"></i></a>
        <a href="tel:+919236200801" class="social-btn" title="Call"><i data-lucide="phone"></i></a>
      </div>
    </div>
  </div>
</section>
